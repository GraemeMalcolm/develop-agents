title: Develop AI Agents
description: Learn how to develop AI agents with Microsoft Foundry.
theme: jekyll-theme-minimal
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Default layouts
defaults:
  - scope:
      path: "content"
    values:
      layout: "content"

# Include content directory
include:
  - content

# Exclude files from build
exclude:
  - spec.md
  - README.md
  - Gemfile
  - Gemfile.lock
